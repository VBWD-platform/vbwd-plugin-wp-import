name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — wp_import
    runs-on: ubuntu-latest
    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend
      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/wp_import
      - name: Clone cms dependency
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-plugin-cms
          path: vbwd-backend/plugins/cms
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vbwd-backend/requirements.txt
      - name: Style check — Black
        run: |
          black --check --diff \
            vbwd-backend/plugins/wp_import/ \
            --exclude='/(\.git|\.github|__pycache__|\.pytest_cache)/'
      - name: Style check — Flake8
        run: |
          flake8 vbwd-backend/plugins/wp_import/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=.git,.github,__pycache__,.pytest_cache
      - name: Style check — Mypy
        run: |
          PLUGIN_SRC=vbwd-backend/plugins/wp_import/src
          if [ -d "$PLUGIN_SRC" ]; then
            mypy "$PLUGIN_SRC" --ignore-missing-imports --no-error-summary --python-version=3.11
          else
            echo "No src/ directory — skipping mypy."
          fi
      - name: Start services
        working-directory: vbwd-backend
        run: docker compose up -d --build
      - name: Enable all present plugins
        working-directory: vbwd-backend
        run: |
          EXCLUDE_FILE="ci/plugins-enable-exclude.txt"
          for d in plugins/*/; do
            name=$(basename "$d")
            [ -f "${d}__init__.py" ] || continue
            if [ -f "$EXCLUDE_FILE" ] && grep -qxF "$name" "$EXCLUDE_FILE"; then
              echo "Skipping CI-excluded plugin: $name"; continue
            fi
            docker compose exec -T api flask --app "vbwd:create_app()" plugins enable "$name" \
              && echo "Plugin $name enabled." \
              || echo "Plugin $name already enabled or not registerable — continuing."
          done
      - name: Run unit tests
        working-directory: vbwd-backend
        run: |
          mkdir -p test-results
          if [ -d "plugins/wp_import/tests/unit" ]; then
            TESTS_DIR="plugins/wp_import/tests/unit/"
          elif [ -d "plugins/wp_import/tests" ]; then
            TESTS_DIR="plugins/wp_import/tests/"
            IGNORE="--ignore=plugins/wp_import/tests/integration/"
          else
            echo "No unit tests — skipping."; exit 0
          fi
          docker compose --profile test run --rm -T test \
            pytest $TESTS_DIR ${IGNORE:-} -v --tb=short --junit-xml=/app/test-results/unit.xml
      - name: Run integration tests
        if: always()
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/wp_import/tests/integration" ]; then
            docker compose --profile test run --rm -T test \
              pytest plugins/wp_import/tests/integration/ -v --tb=short --junit-xml=/app/test-results/integration.xml
          else
            echo "No integration tests — skipping."
          fi
      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
